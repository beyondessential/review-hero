name: Review Hero Auto-Fix

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model for auto-fix"
        type: string
        default: claude-sonnet-4-6
      runner:
        description: "GitHub Actions runner for all jobs"
        type: string
        default: ubuntu-slim
      ci-runner:
        description: "Runner for auto-fix when fixing CI failures (may need build tools)"
        type: string
        default: ubuntu-latest
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — set per-repo for billing separation"
        required: false
      REVIEW_HERO_APP_ID:
        description: "Review Hero GitHub App ID — typically provided as an org-level secret"
        required: false
      REVIEW_HERO_PRIVATE_KEY:
        description: "Review Hero GitHub App private key — typically provided as an org-level secret"
        required: false

concurrency:
  group: review-hero-auto-fix-${{ github.event.pull_request.number }}

jobs:
  check-trigger:
    runs-on: ${{ inputs.runner }}
    outputs:
      fix_reviews: ${{ steps.check.outputs.fix_reviews }}
      fix_ci: ${{ steps.check.outputs.fix_ci }}
    steps:
      - id: check
        uses: actions/github-script@v8
        with:
          script: |
            const action = context.payload.action;
            // Only check the body on events where the user could have ticked
            // a checkbox: opened (pre-ticked template), reopened, or edited.
            // Ignore synchronize — auto-fix pushes commits itself, so
            // re-triggering on new pushes would cause an infinite loop.
            if (action !== 'edited' && action !== 'opened' && action !== 'reopened') {
              core.setOutput('fix_reviews', 'false');
              core.setOutput('fix_ci', 'false');
              return;
            }
            const body = context.payload.pull_request?.body ?? '';
            const reviewMatch = body.match(/\[(?<checked>[ x])\]\s+\*\*Auto-fix review suggestions\*\* <!-- #auto-fix -->/);
            const ciMatch = body.match(/\[(?<checked>[ x])\]\s+\*\*Auto-fix CI failures\*\* <!-- #auto-fix-ci -->/);
            core.setOutput('fix_reviews', reviewMatch?.groups.checked === 'x' ? 'true' : 'false');
            core.setOutput('fix_ci', ciMatch?.groups.checked === 'x' ? 'true' : 'false');

  auto-fix:
    needs: check-trigger
    if: needs.check-trigger.outputs.fix_reviews == 'true' || needs.check-trigger.outputs.fix_ci == 'true'
    runs-on: ${{ needs.check-trigger.outputs.fix_ci == 'true' && inputs.ci-runner || inputs.runner }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo (at PR branch, with push access) ────────
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      # ── Fetch base branch ────────────────────────────────────────────
      # Config, auto-fix rules, AI rules, and sandbox Dockerfiles are read
      # from the base branch so a malicious PR cannot inject prompt content
      # or tamper with the sandbox configuration.
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1

      # ── Checkout review-hero (for scripts + prompts) ─────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/review-hero
          path: .review-hero
          token: ${{ steps.app-token.outputs.token }}

      # ── Setup ────────────────────────────────────────────────────────
      - name: Detect Node.js version
        run: "[ -f .node-version ] || echo latest > .node-version"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install review-hero dependencies
        run: npm ci --prefix .review-hero

      # ── Read project context + sandbox config from caller config ─────
      - name: Read caller config
        id: config
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Read config from the base branch, not the PR branch, to prevent
          # a malicious PR from injecting prompt content via config values.
          CONFIG_CONTENT=$(git show "$BASE_SHA:.github/review-hero/config.yml" 2>/dev/null || echo "")
          if [ -n "$CONFIG_CONTENT" ]; then
            PROJECT=$(echo "$CONFIG_CONTENT" | yq -r '.project // ""')
            DESCRIPTION=$(echo "$CONFIG_CONTENT" | yq -r '.description // ""')
            if [ -n "$PROJECT" ] && [ -n "$DESCRIPTION" ]; then
              CONTEXT="You are fixing review comments and/or CI failures on a PR for **${PROJECT}**, ${DESCRIPTION}."
            elif [ -n "$PROJECT" ]; then
              CONTEXT="You are fixing review comments and/or CI failures on a PR for **${PROJECT}**."
            else
              CONTEXT=""
            fi
          else
            CONTEXT=""
          fi
          {
            echo "project_context<<REVIEW_HERO_EOF"
            echo "$CONTEXT"
            echo "REVIEW_HERO_EOF"
          } >> "$GITHUB_OUTPUT"

          # Extract auto-fix rules from the base branch to a temp file
          RULES_TMP="/tmp/base-auto-fix-rules.md"
          git show "$BASE_SHA:.github/review-hero/auto-fix-rules.md" > "$RULES_TMP" 2>/dev/null || true
          if [ -s "$RULES_TMP" ]; then
            echo "custom_rules_path=${RULES_TMP}" >> "$GITHUB_OUTPUT"
          else
            echo "custom_rules_path=" >> "$GITHUB_OUTPUT"
          fi

          # ── Sandbox config ──────────────────────────────────────────
          SANDBOX_DISABLED="false"
          SANDBOX_DOCKERFILE=""

          if [ -n "$CONFIG_CONTENT" ]; then
            SANDBOX_DISABLED=$(echo "$CONFIG_CONTENT" | yq -r '.sandbox.dangerousDisableSandbox // false')
            SANDBOX_DOCKERFILE=$(echo "$CONFIG_CONTENT" | yq -r '.sandbox.dockerfile // ""')
          fi

          # Normalise disabled to strict "true"/"false"
          if [ "$SANDBOX_DISABLED" = "true" ]; then
            SANDBOX_DISABLED="true"
          else
            SANDBOX_DISABLED="false"
          fi

          # Validate dockerfile path: reject path traversal and absolute paths
          if [ -n "$SANDBOX_DOCKERFILE" ]; then
            case "$SANDBOX_DOCKERFILE" in
              ../*|*/../*|/*)
                echo "::error::Invalid sandbox.dockerfile path '${SANDBOX_DOCKERFILE}' — must be relative to .github/review-hero/ with no path traversal"
                exit 1
                ;;
            esac
            # Verify the file exists in the base branch
            if ! git show "$BASE_SHA:.github/review-hero/${SANDBOX_DOCKERFILE}" > /dev/null 2>&1; then
              echo "::error::sandbox.dockerfile '${SANDBOX_DOCKERFILE}' not found in base branch at .github/review-hero/${SANDBOX_DOCKERFILE}"
              exit 1
            fi
          fi

          # If sandbox is disabled, dockerfile is irrelevant
          if [ "$SANDBOX_DISABLED" = "true" ]; then
            SANDBOX_DOCKERFILE=""
          fi

          echo "sandbox_disabled=$SANDBOX_DISABLED" >> "$GITHUB_OUTPUT"
          echo "sandbox_dockerfile=$SANDBOX_DOCKERFILE" >> "$GITHUB_OUTPUT"

          if [ "$SANDBOX_DISABLED" = "true" ]; then
            echo "::warning::Sandbox is disabled via dangerousDisableSandbox. Claude will run directly on the runner with access to all environment variables and secrets."
          elif [ -n "$SANDBOX_DOCKERFILE" ]; then
            echo "Using custom sandbox Dockerfile: .github/review-hero/${SANDBOX_DOCKERFILE}"
          else
            echo "Using default sandbox Dockerfile"
          fi

      # ── Sandbox warning ──────────────────────────────────────────────
      - name: "⚠️ Sandbox disabled"
        if: steps.config.outputs.sandbox_disabled == 'true'
        run: |
          echo "::warning::Running Claude without Docker sandbox. Claude has direct access to the runner environment, including all environment variables. This is enabled by dangerousDisableSandbox in the repo's .github/review-hero/config.yml."

      # ── Build sandbox image (default) ────────────────────────────────
      - name: Build Claude sandbox image
        if: steps.config.outputs.sandbox_disabled != 'true' && steps.config.outputs.sandbox_dockerfile == ''
        run: docker build -t claude-sandbox:latest -f .review-hero/docker/Dockerfile .review-hero/docker

      # ── Build sandbox image (custom Dockerfile) ──────────────────────
      # The custom Dockerfile is extracted from the base branch into a temp
      # directory. The entire .github/review-hero/ tree is extracted so that
      # COPY/ADD instructions can reference sibling files.
      - name: Build Claude sandbox image (custom Dockerfile)
        if: steps.config.outputs.sandbox_disabled != 'true' && steps.config.outputs.sandbox_dockerfile != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          SANDBOX_DOCKERFILE: ${{ steps.config.outputs.sandbox_dockerfile }}
        run: |
          CONTEXT_DIR="/tmp/base-sandbox-context"
          mkdir -p "$CONTEXT_DIR"
          git archive "$BASE_SHA" -- .github/review-hero/ | tar -C "$CONTEXT_DIR" -x --strip-components=2
          docker build -t claude-sandbox:latest \
            -f "$CONTEXT_DIR/$SANDBOX_DOCKERFILE" \
            "$CONTEXT_DIR"

      # ── Install Claude CLI (unsandboxed mode) ───────────────────────
      # When the sandbox is disabled, Claude CLI runs directly on the
      # runner instead of inside the Docker container.
      - name: Install Claude CLI
        if: steps.config.outputs.sandbox_disabled == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # ── Detect AI rules (from base branch) ──────────────────────────
      - name: Detect AI rules
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Extract known AI rules files from the base branch into a temp
          # directory, then run detection against it. This prevents a PR
          # from injecting prompt content via AI rules files.
          RULES_DIR="/tmp/base-ai-rules-root"
          mkdir -p "$RULES_DIR/.github" "$RULES_DIR/.cursor/rules"

          for f in .cursorrules .windsurfrules .clinerules; do
            git show "$BASE_SHA:$f" > "$RULES_DIR/$f" 2>/dev/null || rm -f "$RULES_DIR/$f"
          done
          git show "$BASE_SHA:.github/copilot-instructions.md" > "$RULES_DIR/.github/copilot-instructions.md" 2>/dev/null \
            || rm -f "$RULES_DIR/.github/copilot-instructions.md"

          # Cursor rules directory
          for f in $(git ls-tree --name-only "$BASE_SHA" .cursor/rules/ 2>/dev/null || true); do
            fname=$(basename "$f")
            case "$fname" in *.md|*.mdc) git show "$BASE_SHA:$f" > "$RULES_DIR/.cursor/rules/$fname" 2>/dev/null || true ;; esac
          done

          # .rules can be either a file or a directory
          if ! git show "$BASE_SHA:.rules" > "$RULES_DIR/.rules" 2>/dev/null; then
            rm -f "$RULES_DIR/.rules"
            mkdir -p "$RULES_DIR/.rules"
            for f in $(git ls-tree --name-only "$BASE_SHA" .rules/ 2>/dev/null || true); do
              fname=$(basename "$f")
              case "$fname" in *.md) git show "$BASE_SHA:$f" > "$RULES_DIR/.rules/$fname" 2>/dev/null || true ;; esac
            done
          fi

          sh .review-hero/scripts/detect-ai-rules.sh /tmp/ai-rules.md "$RULES_DIR"

      # ── Run auto-fix ─────────────────────────────────────────────────
      - name: Run auto-fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_HERO_APP_ID: ${{ secrets.REVIEW_HERO_APP_ID }}
          MODEL: ${{ inputs.model }}
          FIX_REVIEWS: ${{ needs.check-trigger.outputs.fix_reviews }}
          FIX_CI: ${{ needs.check-trigger.outputs.fix_ci }}
          PROMPT_PATH: .review-hero/prompts/auto-fix.md
          PROJECT_CONTEXT: ${{ steps.config.outputs.project_context }}
          CUSTOM_RULES_PATH: ${{ steps.config.outputs.custom_rules_path }}
          AI_RULES_PATH: /tmp/ai-rules.md
          SELF_WORKFLOW: ${{ github.workflow }}
          SANDBOX_SCRIPT: .review-hero/scripts/run-in-sandbox.mjs
          SANDBOX_IMAGE: claude-sandbox:latest
          SANDBOX_DISABLED: ${{ steps.config.outputs.sandbox_disabled }}
        run: node .review-hero/scripts/auto-fix.mjs
