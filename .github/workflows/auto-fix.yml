name: Review Hero Auto-Fix

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model for auto-fix"
        type: string
        default: claude-sonnet-4-6
      runner:
        description: "GitHub Actions runner for all jobs"
        type: string
        default: ubuntu-slim
      ref:
        description: "Git ref of review-hero to use (e.g. main, v1, v1.2.0)"
        type: string
        default: v1
      ci-runner:
        description: "Runner for auto-fix when fixing CI failures (may need build tools)"
        type: string
        default: ubuntu-latest
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key"
        required: false
      REVIEW_HERO_ANTHROPIC_API_KEY:
        description: "Anthropic API key (preferred over ANTHROPIC_API_KEY if both are set)"
        required: false
      ANTHROPIC_BASE_URL:
        description: "Custom base URL for the Anthropic API (e.g. for proxies)"
        required: false
      REVIEW_HERO_ANTHROPIC_BASE_URL:
        description: "Custom base URL for the Anthropic API (preferred over ANTHROPIC_BASE_URL if both are set)"
        required: false
      REVIEW_HERO_APP_ID:
        description: "Review Hero GitHub App ID — typically provided as an org-level secret"
        required: true
      REVIEW_HERO_PRIVATE_KEY:
        description: "Review Hero GitHub App private key — typically provided as an org-level secret"
        required: true
      REVIEW_HERO_BOOTSTRAP_BRANCH:
        description: "Optional branch to read config from when the default branch has no Review Hero config yet (useful during initial setup)"
        required: false

concurrency:
  group: review-hero-auto-fix-${{ github.event.pull_request.number }}

jobs:
  check-trigger:
    runs-on: ${{ inputs.runner }}
    outputs:
      fix_reviews: ${{ steps.check.outputs.fix_reviews }}
      fix_ci: ${{ steps.check.outputs.fix_ci }}
    steps:
      - id: check
        uses: actions/github-script@v8
        with:
          script: |
            const action = context.payload.action;
            // Only check the body on events where the user could have ticked
            // a checkbox: opened (pre-ticked template), reopened, or edited.
            // Ignore synchronize — auto-fix pushes commits itself, so
            // re-triggering on new pushes would cause an infinite loop.
            if (action !== 'edited' && action !== 'opened' && action !== 'reopened') {
              core.setOutput('fix_reviews', 'false');
              core.setOutput('fix_ci', 'false');
              return;
            }
            const body = context.payload.pull_request?.body ?? '';
            const reviewMatch = body.match(/\[(?<checked>[ x])\]\s+\*\*Auto-fix review suggestions\*\* <!-- #auto-fix -->/);
            const ciMatch = body.match(/\[(?<checked>[ x])\]\s+\*\*Auto-fix CI failures\*\* <!-- #auto-fix-ci -->/);
            core.setOutput('fix_reviews', reviewMatch?.groups.checked === 'x' ? 'true' : 'false');
            core.setOutput('fix_ci', ciMatch?.groups.checked === 'x' ? 'true' : 'false');

  auto-fix:
    needs: check-trigger
    if: needs.check-trigger.outputs.fix_reviews == 'true' || needs.check-trigger.outputs.fix_ci == 'true'
    runs-on: ${{ needs.check-trigger.outputs.fix_ci == 'true' && inputs.ci-runner || inputs.runner }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo (at PR branch, with push access) ────────
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      # ── Resolve trusted ref ──────────────────────────────────────────
      # Config, auto-fix rules, and AI rules are read from the repo's
      # default branch — not the PR branch — so a malicious PR cannot
      # inject prompt content via these files. If the default branch has
      # no Review Hero config and a bootstrap branch is configured, fetch
      # and use that instead (useful during initial setup).
      - name: Resolve trusted ref
        id: trusted-ref
        env:
          BOOTSTRAP_BRANCH: ${{ secrets.REVIEW_HERO_BOOTSTRAP_BRANCH }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "$DEFAULT_BRANCH" --depth=1
          DEFAULT_SHA=$(git rev-parse "origin/$DEFAULT_BRANCH")

          # Check for config file existence (not content) so that an
          # empty config.yml is still treated as "present", consistent
          # with the existence check in review.yml.
          if git show "$DEFAULT_SHA:.github/review-hero/config.yml" >/dev/null 2>&1; then
            echo "sha=$DEFAULT_SHA" >> "$GITHUB_OUTPUT"
            echo "Config found on default branch"
          elif [ -n "$BOOTSTRAP_BRANCH" ]; then
            echo "No config on default branch, fetching bootstrap branch: $BOOTSTRAP_BRANCH"
            if ! git fetch origin "$BOOTSTRAP_BRANCH" --depth=1; then
              echo "::error::Bootstrap branch '$BOOTSTRAP_BRANCH' not found on origin. Check the REVIEW_HERO_BOOTSTRAP_BRANCH secret."
              exit 1
            fi
            BOOTSTRAP_SHA=$(git rev-parse "origin/$BOOTSTRAP_BRANCH")
            echo "sha=$BOOTSTRAP_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$DEFAULT_SHA" >> "$GITHUB_OUTPUT"
            echo "No config on default branch and no bootstrap branch configured"
          fi

      # ── Checkout review-hero (for scripts + prompts) ─────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: beyondessential/review-hero
          ref: ${{ inputs.ref }}
          path: .review-hero

      # ── Setup ────────────────────────────────────────────────────────
      - name: Detect Node.js version
        run: "[ -f .node-version ] || echo latest > .node-version"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install review-hero dependencies
        run: npm ci --prefix .review-hero

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Read project context from caller config (trusted ref) ────────
      - name: Read caller config
        id: config
        env:
          TRUSTED_SHA: ${{ steps.trusted-ref.outputs.sha }}
        run: |
          # Read config from the trusted ref (default branch, or bootstrap
          # branch during initial setup), not the PR branch, to prevent a
          # malicious PR from injecting prompt content via config values.
          CONFIG_CONTENT=$(git show "$TRUSTED_SHA:.github/review-hero/config.yml" 2>/dev/null || echo "")
          if [ -n "$CONFIG_CONTENT" ]; then
            PROJECT=$(echo "$CONFIG_CONTENT" | yq -r '.project // ""')
            DESCRIPTION=$(echo "$CONFIG_CONTENT" | yq -r '.description // ""')
            if [ -n "$PROJECT" ] && [ -n "$DESCRIPTION" ]; then
              CONTEXT="You are fixing review comments and/or CI failures on a PR for **${PROJECT}**, ${DESCRIPTION}."
            elif [ -n "$PROJECT" ]; then
              CONTEXT="You are fixing review comments and/or CI failures on a PR for **${PROJECT}**."
            else
              CONTEXT=""
            fi
          else
            CONTEXT=""
          fi
          {
            echo "project_context<<REVIEW_HERO_EOF"
            echo "$CONTEXT"
            echo "REVIEW_HERO_EOF"
          } >> "$GITHUB_OUTPUT"

          # Extract auto-fix rules from the trusted ref to a temp file
          RULES_TMP="/tmp/base-auto-fix-rules.md"
          git show "$TRUSTED_SHA:.github/review-hero/auto-fix-rules.md" > "$RULES_TMP" 2>/dev/null || true
          if [ -s "$RULES_TMP" ]; then
            echo "custom_rules_path=${RULES_TMP}" >> "$GITHUB_OUTPUT"
          else
            echo "custom_rules_path=" >> "$GITHUB_OUTPUT"
          fi

      # ── Detect AI rules (from trusted ref) ──────────────────────────
      - name: Detect AI rules
        env:
          TRUSTED_SHA: ${{ steps.trusted-ref.outputs.sha }}
        run: |
          # Extract known AI rules files from the trusted ref into a temp
          # directory, then run detection against it. This prevents a PR
          # from injecting prompt content via AI rules files.
          RULES_DIR="/tmp/base-ai-rules-root"
          mkdir -p "$RULES_DIR"

          for f in .cursorrules .windsurfrules .clinerules .rules; do
            git show "$TRUSTED_SHA:$f" > "$RULES_DIR/$f" 2>/dev/null || rm -f "$RULES_DIR/$f" || true
          done

          mkdir -p "$RULES_DIR/.github" || true
          git show "$TRUSTED_SHA:.github/copilot-instructions.md" > "$RULES_DIR/.github/copilot-instructions.md" 2>/dev/null \
            || rm -f "$RULES_DIR/.github/copilot-instructions.md" || true

          # Cursor rules directory
          for f in $(git ls-tree --name-only "$TRUSTED_SHA" .cursor/rules/ 2>/dev/null || true); do
            mkdir -p "$RULES_DIR/.cursor/rules" || true
            fname=$(basename "$f") || true
            case "$fname" in *.md|*.mdc) git show "$TRUSTED_SHA:$f" > "$RULES_DIR/.cursor/rules/$fname" 2>/dev/null || true ;; esac
          done || true

          # Zed rules directory
          for f in $(git ls-tree --name-only "$TRUSTED_SHA" .rules/ 2>/dev/null || true); do
            mkdir -p "$RULES_DIR/.rules" || true
            fname=$(basename "$f") || true
            case "$fname" in *.md) git show "$TRUSTED_SHA:$f" > "$RULES_DIR/.rules/$fname" 2>/dev/null || true ;; esac
          done || true

          sh .review-hero/scripts/detect-ai-rules.sh /tmp/ai-rules.md "$RULES_DIR"

      # ── Run auto-fix ─────────────────────────────────────────────────
      - name: Run auto-fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.REVIEW_HERO_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.REVIEW_HERO_ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_HERO_APP_ID: ${{ secrets.REVIEW_HERO_APP_ID }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          MODEL: ${{ inputs.model }}
          FIX_REVIEWS: ${{ needs.check-trigger.outputs.fix_reviews }}
          FIX_CI: ${{ needs.check-trigger.outputs.fix_ci }}
          PROMPT_PATH: .review-hero/prompts/auto-fix.md
          PROJECT_CONTEXT: ${{ steps.config.outputs.project_context }}
          CUSTOM_RULES_PATH: ${{ steps.config.outputs.custom_rules_path }}
          AI_RULES_PATH: /tmp/ai-rules.md
          SELF_WORKFLOW: ${{ github.workflow }}
        run: node .review-hero/scripts/auto-fix.mjs
