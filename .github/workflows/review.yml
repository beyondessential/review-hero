name: Review Hero

on:
  workflow_call:
    inputs:
      trigger:
        description: "'checkbox' = only on PR body edit with checkbox checked, 'always' = every PR event"
        type: string
        default: checkbox
      model:
        description: "Claude model for review agents"
        type: string
        default: claude-sonnet-4-6
      runner:
        description: "GitHub Actions runner for all jobs"
        type: string
        default: ubuntu-slim
      voters:
        description: "Number of independent voters per agent (>=2 enables consensus filtering to reduce noise)"
        type: number
        default: 3
      ref:
        description: "Git ref of review-hero to use (e.g. main, v1, v1.2.0)"
        type: string
        default: v1
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key"
        required: false
      REVIEW_HERO_ANTHROPIC_API_KEY:
        description: "Anthropic API key (preferred over ANTHROPIC_API_KEY if both are set)"
        required: false
      ANTHROPIC_BASE_URL:
        description: "Custom base URL for the Anthropic API (e.g. for proxies)"
        required: false
      REVIEW_HERO_ANTHROPIC_BASE_URL:
        description: "Custom base URL for the Anthropic API (preferred over ANTHROPIC_BASE_URL if both are set)"
        required: false
      REVIEW_HERO_APP_ID:
        description: "Review Hero GitHub App ID — typically provided as an org-level secret"
        required: true
      REVIEW_HERO_PRIVATE_KEY:
        description: "Review Hero GitHub App private key — typically provided as an org-level secret"
        required: true
      REVIEW_HERO_BOOTSTRAP_BRANCH:
        description: "Optional branch to read config from when the default branch has no Review Hero config yet (useful during initial setup)"
        required: false

concurrency:
  group: review-hero-${{ github.event.pull_request.number }}

jobs:
  triage:
    runs-on: ${{ inputs.runner }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      matrix: ${{ steps.triage.outputs.matrix }}
      max_turns: ${{ steps.triage.outputs.max_turns }}
      agent_model: ${{ steps.triage.outputs.agent_model }}
      agent_names: ${{ steps.triage.outputs.agent_names }}
      project_context: ${{ steps.config.outputs.project_context }}
      trusted_ref: ${{ steps.resolve-trusted-ref.outputs.sha }}
    steps:
      # ── Trigger check ────────────────────────────────────────────────
      - id: check
        uses: actions/github-script@v8
        with:
          script: |
            const trigger = '${{ inputs.trigger }}';
            if (trigger === 'always') {
              core.setOutput('should_run', 'true');
              return;
            }
            // checkbox mode: only run when PR body is edited and checkbox is checked
            if (context.payload.action !== 'edited') {
              core.setOutput('should_run', 'false');
              return;
            }
            const body = context.payload.pull_request?.body;
            const match = body?.match(/\[(?<checked>[ x])\]\s+\*\*Run Review Hero\*\* <!-- #ai-review -->/);
            core.setOutput('should_run', match?.groups.checked === 'x');

      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        if: steps.check.outputs.should_run == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo at default branch ───────────────────────
      # Read config, custom agent prompts, and ignore patterns from the
      # repo's default branch — not the PR branch — so a malicious PR
      # cannot inject custom agents, modify ignore patterns, or tamper
      # with config values.
      - name: Checkout caller repo (default branch)
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: caller

      # ── Resolve trusted ref ──────────────────────────────────────────
      # If the default branch has no Review Hero config and a bootstrap
      # branch is configured, re-checkout from the bootstrap branch. This
      # is useful during initial setup when the default branch doesn't
      # have the config yet.
      - name: Resolve trusted ref
        if: steps.check.outputs.should_run == 'true'
        id: resolve-trusted-ref
        env:
          BOOTSTRAP_BRANCH: ${{ secrets.REVIEW_HERO_BOOTSTRAP_BRANCH }}
        run: |
          # Pin to a SHA so triage and all parallel review-agent jobs
          # read identical config even if the branch moves between jobs.
          DEFAULT_SHA=$(git -C caller rev-parse HEAD)
          if [ -f "caller/.github/review-hero/config.yml" ]; then
            echo "sha=$DEFAULT_SHA" >> "$GITHUB_OUTPUT"
            echo "is_bootstrap=false" >> "$GITHUB_OUTPUT"
            echo "Config found on default branch (${DEFAULT_SHA})"
          elif [ -n "$BOOTSTRAP_BRANCH" ]; then
            if ! git -C caller fetch origin "$BOOTSTRAP_BRANCH" --depth=1; then
              echo "::error::Bootstrap branch '$BOOTSTRAP_BRANCH' not found on origin. Check the REVIEW_HERO_BOOTSTRAP_BRANCH secret."
              exit 1
            fi
            BOOTSTRAP_SHA=$(git -C caller rev-parse FETCH_HEAD)
            echo "sha=$BOOTSTRAP_SHA" >> "$GITHUB_OUTPUT"
            echo "is_bootstrap=true" >> "$GITHUB_OUTPUT"
            echo "No config on default branch, using bootstrap branch: $BOOTSTRAP_BRANCH (${BOOTSTRAP_SHA})"
          else
            echo "sha=$DEFAULT_SHA" >> "$GITHUB_OUTPUT"
            echo "is_bootstrap=false" >> "$GITHUB_OUTPUT"
            echo "No config on default branch and no bootstrap branch configured"
          fi

      - name: Re-checkout from bootstrap branch
        if: steps.check.outputs.should_run == 'true' && steps.resolve-trusted-ref.outputs.is_bootstrap == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-trusted-ref.outputs.sha }}
          path: caller

      # ── Checkout review-hero (for scripts + base prompts) ────────────
      - name: Checkout review-hero
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: beyondessential/review-hero
          ref: ${{ inputs.ref }}
          path: review-hero

      # ── Setup ────────────────────────────────────────────────────────
      - name: Ensure Node.js version file
        if: steps.check.outputs.should_run == 'true'
        run: "[ -f caller/.node-version ] && cp caller/.node-version .node-version || echo latest > .node-version"

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      # ── Read project context from caller config ──────────────────────
      - name: Read caller config
        if: steps.check.outputs.should_run == 'true'
        id: config
        run: |
          CONFIG="caller/.github/review-hero/config.yml"
          if [ -f "$CONFIG" ]; then
            PROJECT=$(yq -r '.project // ""' "$CONFIG")
            DESCRIPTION=$(yq -r '.description // ""' "$CONFIG")
            if [ -n "$PROJECT" ] && [ -n "$DESCRIPTION" ]; then
              CONTEXT="You are reviewing a PR for **${PROJECT}**, ${DESCRIPTION}."
            elif [ -n "$PROJECT" ]; then
              CONTEXT="You are reviewing a PR for **${PROJECT}**."
            else
              CONTEXT=""
            fi
          else
            CONTEXT=""
          fi
          {
            echo "project_context<<REVIEW_HERO_EOF"
            echo "$CONTEXT"
            echo "REVIEW_HERO_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Get PR diff ──────────────────────────────────────────────────
      - name: Get PR diff
        if: steps.check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" > /tmp/pr.diff

      # ── Triage ───────────────────────────────────────────────────────
      - name: Triage
        if: steps.check.outputs.should_run == 'true'
        id: triage
        env:
          DIFF_PATH: /tmp/pr.diff
          FILTERED_DIFF_PATH: /tmp/pr-filtered.diff
          ANTHROPIC_API_KEY: ${{ secrets.REVIEW_HERO_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.REVIEW_HERO_ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
          REVIEW_HERO_DIR: review-hero
          CALLER_REPO_DIR: caller
          VOTERS: ${{ inputs.voters }}
          DEFAULT_MODEL: ${{ inputs.model }}
        run: node review-hero/scripts/triage.mjs

      # ── Prepare suppressions for downstream jobs ─────────────────────
      - name: Prepare suppressions
        if: steps.check.outputs.should_run == 'true'
        run: |
          SUPP="caller/.github/review-hero/suppressions.yml"
          if [ -f "$SUPP" ]; then
            cp "$SUPP" /tmp/suppressions.yml
            echo "Suppressions file found"
          else
            echo "[]" > /tmp/suppressions.yml
            echo "No suppressions file"
          fi

      # ── Upload filtered diff for agent jobs ──────────────────────────
      - name: Upload filtered diff
        if: steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: filtered-diff
          path: /tmp/pr-filtered.diff
          retention-days: 1

      - name: Upload suppressions
        if: steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: suppressions
          path: /tmp/suppressions.yml
          retention-days: 1

  review-agent:
    needs: triage
    if: needs.triage.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.triage.outputs.matrix).agents }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo at PR HEAD ──────────────────────────────
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ── Checkout caller config from trusted ref ──────────────────────
      # Custom agent prompts and AI rules files are read from a trusted
      # ref (default branch, or bootstrap branch during initial setup)
      # so that a PR cannot inject malicious prompt content.
      - name: Checkout caller config (trusted ref)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.triage.outputs.trusted_ref || github.event.repository.default_branch }}
          sparse-checkout: |
            .github/review-hero
            .github/copilot-instructions.md
            .cursorrules
            .windsurfrules
            .clinerules
            .rules
            .cursor/rules
          sparse-checkout-cone-mode: false
          path: .caller-base

      # ── Checkout review-hero (for prompts) ───────────────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: beyondessential/review-hero
          ref: ${{ inputs.ref }}
          path: .review-hero

      # ── Setup ────────────────────────────────────────────────────────
      - name: Ensure Node.js version file
        run: "[ -f .node-version ] || echo latest > .node-version"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Download filtered diff ───────────────────────────────────────
      - name: Download filtered diff
        uses: actions/download-artifact@v8
        with:
          name: filtered-diff
          path: /tmp

      # ── Detect AI rules (from trusted ref) ──────────────────────────
      - name: Detect AI rules
        run: sh .review-hero/scripts/detect-ai-rules.sh /tmp/ai-rules.md .caller-base

      # ── Run agent ────────────────────────────────────────────────────
      - name: Run ${{ matrix.agent.key }} agent${{ matrix.agent.voter && format(' (voter {0})', matrix.agent.voter) || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.REVIEW_HERO_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.REVIEW_HERO_ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PROJECT_CONTEXT: ${{ needs.triage.outputs.project_context }}
          VOTER: ${{ matrix.agent.voter }}
          AGENT_MODEL: ${{ needs.triage.outputs.agent_model }}
        timeout-minutes: 20
        run: |
          # Build result filename — include voter suffix when multi-voter
          RESULT_NAME="${{ matrix.agent.key }}"
          if [ -n "$VOTER" ]; then
            RESULT_NAME="${RESULT_NAME}-voter-${VOTER}"
          fi

          # Voter-specific review lens — each voter approaches the review
          # from a different angle to maximise diversity. When findings
          # survive consensus across these different lenses, they're much
          # more likely to be real issues.
          VOTER_PROMPT=""
          case "$VOTER" in
            0) VOTER_PROMPT="## Review Approach\n\nFocus on the most impactful issues. Be selective — only flag things that a senior engineer would consider worth changing before merge. Prefer fewer, higher-confidence findings." ;;
            1) VOTER_PROMPT="## Review Approach\n\nReview with fresh eyes. Consider edge cases, error paths, and assumptions in the code. Think about what could go wrong in production under unusual conditions." ;;
            2) VOTER_PROMPT="## Review Approach\n\nThink about this code from a maintainer's perspective. Consider readability, correctness of the approach, and whether the code does what the PR title suggests. Flag anything misleading or subtly wrong." ;;
          esac

          # Build the prompt by concatenating:
          # 1. Project context (if any)
          # 2. Base agent prompt
          # 3. Voter-specific review lens (if multi-voter)
          # 4. Specialisation prompt
          # 5. Repository AI rules (non-CLAUDE.md — CLAUDE.md is read natively by Claude CLI)
          # 6. PR title + diff

          {
            if [ -n "$PROJECT_CONTEXT" ]; then
              printf '## Project Context\n\n%s\n\n' "$PROJECT_CONTEXT"
            fi

            cat .review-hero/prompts/agent-prompt.md

            if [ -n "$VOTER_PROMPT" ]; then
              printf '\n\n%b' "$VOTER_PROMPT"
            fi

            printf '\n\n'
            if [ "${{ matrix.agent.source }}" = "base" ]; then
              cat ".review-hero/prompts/${{ matrix.agent.key }}.md"
            else
              # Read custom prompts from the trusted ref checkout so a PR
              # cannot inject malicious agent prompts.
              cat ".caller-base/.github/review-hero/prompts/${{ matrix.agent.key }}.md"
            fi

            if [ -s /tmp/ai-rules.md ]; then
              printf '\n\n## Repository AI Rules\n\nThis repository defines the following AI coding rules. Follow them when reviewing.\n\n'
              cat /tmp/ai-rules.md
            fi

            printf '\n\n## PR Title\n\n%s\n\n## PR Diff\n\n```diff\n' "$PR_TITLE"
            cat /tmp/pr-filtered.diff
            echo '```'
          } | claude -p \
              --output-format json \
              --model "$AGENT_MODEL" \
              --max-turns ${{ needs.triage.outputs.max_turns }} \
              --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git show:*),Bash(git diff:*)" \
            > "/tmp/${RESULT_NAME}-result.json"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-${{ matrix.agent.key }}${{ matrix.agent.voter && format('-voter-{0}', matrix.agent.voter) || '' }}
          path: /tmp/${{ matrix.agent.key }}${{ matrix.agent.voter && format('-voter-{0}', matrix.agent.voter) || '' }}-result.json
          retention-days: 1

  orchestrate-review:
    needs: [triage, review-agent]
    if: always() && needs.triage.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout review-hero (for orchestrate script) ────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: beyondessential/review-hero
          ref: ${{ inputs.ref }}
          path: review-hero

      # ── Setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      # ── Download agent artifacts ─────────────────────────────────────
      # Use merge-multiple so all agent results land as flat files in
      # /tmp/artifacts (e.g. bugs-result.json, design-result.json).
      # Each file is already uniquely named by the agent key, so there
      # are no collisions and no dependency on subdirectory structure.
      - name: Download agent artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          pattern: review-*
          merge-multiple: true

      - name: Download suppressions
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: suppressions
          path: /tmp

      # ── Orchestrate ──────────────────────────────────────────────────
      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_ACTIONS_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACTS_DIR: /tmp/artifacts
          AGENT_NAMES: ${{ needs.triage.outputs.agent_names }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          VOTERS: ${{ inputs.voters }}
          SUPPRESSIONS_PATH: /tmp/suppressions.yml
          ANTHROPIC_API_KEY: ${{ secrets.REVIEW_HERO_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.REVIEW_HERO_ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
        run: node review-hero/scripts/orchestrate.mjs
