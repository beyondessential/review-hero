name: Review Hero

on:
  workflow_call:
    inputs:
      trigger:
        description: "'checkbox' = only on PR body edit with checkbox checked, 'always' = every PR event"
        type: string
        default: checkbox
      model:
        description: "Claude model for review agents"
        type: string
        default: claude-sonnet-4-6
      runner:
        description: "GitHub Actions runner for all jobs"
        type: string
        default: ubuntu-slim
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — set per-repo for billing separation"
        required: false
      REVIEW_HERO_APP_ID:
        description: "Review Hero GitHub App ID — typically provided as an org-level secret"
        required: false
      REVIEW_HERO_PRIVATE_KEY:
        description: "Review Hero GitHub App private key — typically provided as an org-level secret"
        required: false

concurrency:
  group: review-hero-${{ github.event.pull_request.number }}

jobs:
  triage:
    runs-on: ${{ inputs.runner }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      matrix: ${{ steps.triage.outputs.matrix }}
      max_turns: ${{ steps.triage.outputs.max_turns }}
      agent_names: ${{ steps.triage.outputs.agent_names }}
      project_context: ${{ steps.config.outputs.project_context }}
      sandbox_disabled: ${{ steps.sandbox.outputs.disabled }}
      sandbox_dockerfile: ${{ steps.sandbox.outputs.dockerfile }}
    steps:
      # ── Trigger check ────────────────────────────────────────────────
      - id: check
        uses: actions/github-script@v8
        with:
          script: |
            const trigger = '${{ inputs.trigger }}';
            if (trigger === 'always') {
              core.setOutput('should_run', 'true');
              return;
            }
            // checkbox mode: only run when PR body is edited and checkbox is checked
            if (context.payload.action !== 'edited') {
              core.setOutput('should_run', 'false');
              return;
            }
            const body = context.payload.pull_request?.body;
            const match = body?.match(/\[(?<checked>[ x])\]\s+\*\*Run Review Hero\*\* <!-- #ai-review -->/);
            core.setOutput('should_run', match?.groups.checked === 'x');

      # ── Generate app token (for cross-repo checkout) ─────────────────
      - name: Generate app token
        if: steps.check.outputs.should_run == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo at base branch ──────────────────────────
      # Read config, custom agent prompts, and ignore patterns from the
      # base branch — not the PR branch — so a malicious PR cannot inject
      # custom agents, modify ignore patterns, or tamper with config values.
      - name: Checkout caller repo (base branch)
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: caller

      # ── Checkout review-hero (for scripts + base prompts) ────────────
      - name: Checkout review-hero
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/review-hero
          path: review-hero
          token: ${{ steps.app-token.outputs.token }}

      # ── Setup ────────────────────────────────────────────────────────
      - name: Ensure Node.js version file
        if: steps.check.outputs.should_run == 'true'
        run: "[ -f caller/.node-version ] && cp caller/.node-version .node-version || echo latest > .node-version"

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      # ── Read project context from caller config ──────────────────────
      - name: Read caller config
        if: steps.check.outputs.should_run == 'true'
        id: config
        run: |
          CONFIG="caller/.github/review-hero/config.yml"
          if [ -f "$CONFIG" ]; then
            PROJECT=$(yq -r '.project // ""' "$CONFIG")
            DESCRIPTION=$(yq -r '.description // ""' "$CONFIG")
            if [ -n "$PROJECT" ] && [ -n "$DESCRIPTION" ]; then
              CONTEXT="You are reviewing a PR for **${PROJECT}**, ${DESCRIPTION}."
            elif [ -n "$PROJECT" ]; then
              CONTEXT="You are reviewing a PR for **${PROJECT}**."
            else
              CONTEXT=""
            fi
          else
            CONTEXT=""
          fi
          {
            echo "project_context<<REVIEW_HERO_EOF"
            echo "$CONTEXT"
            echo "REVIEW_HERO_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Read sandbox config from caller config ───────────────────────
      # Sandbox settings are read from the base branch so a malicious PR
      # cannot disable the sandbox or swap the Dockerfile.
      - name: Read sandbox config
        if: steps.check.outputs.should_run == 'true'
        id: sandbox
        run: |
          CONFIG="caller/.github/review-hero/config.yml"
          DISABLED="false"
          DOCKERFILE=""

          if [ -f "$CONFIG" ]; then
            DISABLED=$(yq -r '.sandbox.dangerousDisableSandbox // false' "$CONFIG")
            DOCKERFILE=$(yq -r '.sandbox.dockerfile // ""' "$CONFIG")
          fi

          # Normalise disabled to strict "true"/"false"
          if [ "$DISABLED" = "true" ]; then
            DISABLED="true"
          else
            DISABLED="false"
          fi

          # Validate dockerfile path: reject path traversal and absolute paths
          if [ -n "$DOCKERFILE" ]; then
            case "$DOCKERFILE" in
              ../*|*/../*|/*)
                echo "::error::Invalid sandbox.dockerfile path '${DOCKERFILE}' — must be relative to .github/review-hero/ with no path traversal"
                exit 1
                ;;
            esac
            # Verify the file actually exists in the base branch checkout
            FULL_PATH="caller/.github/review-hero/${DOCKERFILE}"
            if [ ! -f "$FULL_PATH" ]; then
              echo "::error::sandbox.dockerfile '${DOCKERFILE}' not found at ${FULL_PATH}"
              exit 1
            fi
          fi

          # If sandbox is disabled, dockerfile is irrelevant
          if [ "$DISABLED" = "true" ]; then
            DOCKERFILE=""
          fi

          echo "disabled=$DISABLED" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"

          if [ "$DISABLED" = "true" ]; then
            echo "::warning::Sandbox is disabled via dangerousDisableSandbox. Claude will run directly on the runner with access to all environment variables and secrets."
          elif [ -n "$DOCKERFILE" ]; then
            echo "Using custom sandbox Dockerfile: .github/review-hero/${DOCKERFILE}"
          else
            echo "Using default sandbox Dockerfile"
          fi

      # ── Get PR diff ──────────────────────────────────────────────────
      - name: Get PR diff
        if: steps.check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" > /tmp/pr.diff

      # ── Triage ───────────────────────────────────────────────────────
      - name: Triage
        if: steps.check.outputs.should_run == 'true'
        id: triage
        env:
          DIFF_PATH: /tmp/pr.diff
          FILTERED_DIFF_PATH: /tmp/pr-filtered.diff
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_HERO_DIR: review-hero
          CALLER_REPO_DIR: caller
        run: node review-hero/scripts/triage.mjs

      # ── Upload filtered diff for agent jobs ──────────────────────────
      - name: Upload filtered diff
        if: steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: filtered-diff
          path: /tmp/pr-filtered.diff
          retention-days: 1

  review-agent:
    needs: triage
    if: needs.triage.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.triage.outputs.matrix).agents }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout caller repo at PR HEAD ──────────────────────────────
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ── Checkout caller config from base branch ──────────────────────
      # Custom agent prompts, AI rules files, and sandbox Dockerfiles are
      # read from the base branch so that a PR cannot inject malicious
      # prompt content or tamper with the sandbox configuration.
      - name: Checkout caller config (base branch)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: |
            .github/review-hero
            .github/copilot-instructions.md
            .cursorrules
            .windsurfrules
            .clinerules
            .rules
            .cursor/rules
          sparse-checkout-cone-mode: false
          path: .caller-base

      # ── Checkout review-hero (for prompts) ───────────────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/review-hero
          path: .review-hero
          token: ${{ steps.app-token.outputs.token }}

      # ── Setup ────────────────────────────────────────────────────────
      - name: Ensure Node.js version file
        run: "[ -f .node-version ] || echo latest > .node-version"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      # ── Sandbox warning ──────────────────────────────────────────────
      - name: "⚠️ Sandbox disabled"
        if: needs.triage.outputs.sandbox_disabled == 'true'
        run: |
          echo "::warning::Running Claude without Docker sandbox. Claude has direct access to the runner environment, including all environment variables. This is enabled by dangerousDisableSandbox in the repo's .github/review-hero/config.yml."

      # ── Build sandbox image (default) ────────────────────────────────
      - name: Build Claude sandbox image
        if: needs.triage.outputs.sandbox_disabled != 'true' && needs.triage.outputs.sandbox_dockerfile == ''
        run: docker build -t claude-sandbox:latest -f .review-hero/docker/Dockerfile .review-hero/docker

      # ── Build sandbox image (custom Dockerfile) ──────────────────────
      # The custom Dockerfile is read from the base branch checkout. The
      # build context is the .github/review-hero/ directory from the base
      # branch, so COPY/ADD instructions can reference sibling files.
      - name: Build Claude sandbox image (custom Dockerfile)
        if: needs.triage.outputs.sandbox_disabled != 'true' && needs.triage.outputs.sandbox_dockerfile != ''
        env:
          SANDBOX_DOCKERFILE: ${{ needs.triage.outputs.sandbox_dockerfile }}
        run: |
          docker build -t claude-sandbox:latest \
            -f ".caller-base/.github/review-hero/$SANDBOX_DOCKERFILE" \
            .caller-base/.github/review-hero

      # ── Install Claude CLI (unsandboxed mode) ───────────────────────
      # When the sandbox is disabled, Claude CLI runs directly on the
      # runner instead of inside the Docker container.
      - name: Install Claude CLI
        if: needs.triage.outputs.sandbox_disabled == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # ── Download filtered diff ───────────────────────────────────────
      - name: Download filtered diff
        uses: actions/download-artifact@v8
        with:
          name: filtered-diff
          path: /tmp

      # ── Detect AI rules (from base branch) ──────────────────────────
      - name: Detect AI rules
        run: sh .review-hero/scripts/detect-ai-rules.sh /tmp/ai-rules.md .caller-base

      # ── Run agent ────────────────────────────────────────────────────
      - name: Build agent prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PROJECT_CONTEXT: ${{ needs.triage.outputs.project_context }}
        run: |
          # Build the prompt by concatenating:
          # 1. Project context (if any)
          # 2. Base agent prompt
          # 3. Specialisation prompt
          # 4. Repository AI rules (non-CLAUDE.md — CLAUDE.md is read natively by Claude CLI)
          # 5. PR title + diff

          {
            if [ -n "$PROJECT_CONTEXT" ]; then
              printf '## Project Context\n\n%s\n\n' "$PROJECT_CONTEXT"
            fi

            cat .review-hero/prompts/agent-prompt.md

            printf '\n\n'
            if [ "${{ matrix.agent.source }}" = "base" ]; then
              cat ".review-hero/prompts/${{ matrix.agent.key }}.md"
            else
              # Read custom prompts from the base branch checkout so a PR
              # cannot inject malicious agent prompts.
              cat ".caller-base/.github/review-hero/prompts/${{ matrix.agent.key }}.md"
            fi

            if [ -s /tmp/ai-rules.md ]; then
              printf '\n\n## Repository AI Rules\n\nThis repository defines the following AI coding rules. Follow them when reviewing.\n\n'
              cat /tmp/ai-rules.md
            fi

            printf '\n\n## PR Title\n\n%s\n\n## PR Diff\n\n```diff\n' "$PR_TITLE"
            cat /tmp/pr-filtered.diff
            echo '```'
          } > /tmp/agent-prompt.md

      - name: Run ${{ matrix.agent.key }} agent (sandboxed)
        if: needs.triage.outputs.sandbox_disabled != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          jq -n \
            --arg mode "review-agent" \
            --arg prompt "/tmp/agent-prompt.md" \
            --arg model "${{ inputs.model }}" \
            --argjson maxTurns '${{ needs.triage.outputs.max_turns }}' \
            --argjson tools '["Read","Glob","Grep","Bash(git log:*)","Bash(git show:*)","Bash(git diff:*)"]' \
            --arg image "claude-sandbox:latest" \
            '{mode: $mode, prompt: $prompt, model: $model, maxTurns: $maxTurns, tools: $tools, image: $image}' \
            > /tmp/sandbox-config.json
          node .review-hero/scripts/run-in-sandbox.mjs /tmp/sandbox-config.json \
            > /tmp/result.json

      - name: Run ${{ matrix.agent.key }} agent (unsandboxed)
        if: needs.triage.outputs.sandbox_disabled == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat /tmp/agent-prompt.md | claude -p \
            --output-format json \
            --model "${{ inputs.model }}" \
            --max-turns "${{ needs.triage.outputs.max_turns }}" \
            --allowedTools "Read,Glob,Grep,Bash(git log:*),Bash(git show:*),Bash(git diff:*)" \
            > /tmp/result.json

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-${{ matrix.agent.key }}
          path: /tmp/result.json
          retention-days: 1

  orchestrate-review:
    needs: [triage, review-agent]
    if: always() && needs.triage.outputs.should_run == 'true'
    runs-on: ${{ inputs.runner }}
    steps:
      # ── Generate app token ───────────────────────────────────────────
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_HERO_APP_ID }}
          private-key: ${{ secrets.REVIEW_HERO_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # ── Checkout review-hero (for orchestrate script) ────────────────
      - name: Checkout review-hero
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/review-hero
          path: review-hero
          token: ${{ steps.app-token.outputs.token }}

      # ── Setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      # ── Download agent artifacts ─────────────────────────────────────
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          pattern: review-*

      # ── Orchestrate ──────────────────────────────────────────────────
      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_ACTIONS_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACTS_DIR: /tmp/artifacts
          AGENT_NAMES: ${{ needs.triage.outputs.agent_names }}
        run: node review-hero/scripts/orchestrate.mjs
